name: Publish Package to npmjs

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Check package version changed
        id: version_changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="${{ github.event.before }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base_ref="HEAD^"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No previous commit found; skipping npm publish."
            exit 0
          fi

          previous_version="$(git show "${base_ref}:package.json" 2>/dev/null | node -e "let input=''; process.stdin.on('data', d => input += d); process.stdin.on('end', () => console.log(JSON.parse(input).version));" || true)"
          current_version="$(node -p "require('./package.json').version")"

          if [[ -n "$previous_version" && "$previous_version" != "$current_version" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "package.json version changed: ${previous_version} -> ${current_version}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "package.json version did not change; skipping npm publish."
          fi

      - name: Check package contents
        if: steps.version_changed.outputs.changed == 'true'
        run: npm pack --dry-run

      - name: Check published version
        if: steps.version_changed.outputs.changed == 'true'
        id: published
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published; skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is not published yet."
          fi

      - name: Publish to npm
        if: steps.version_changed.outputs.changed == 'true' && steps.published.outputs.already_published == 'false'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
